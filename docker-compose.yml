services:
  gitlab:
    image: gitlab/gitlab-ce:latest
    container_name: gitlab
    restart: unless-stopped
    hostname: gitlab.feifan-game.com
    environment:
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://gitlab.feifan-game.com'

        # 禁用内置 PostgreSQL 和 Redis，使用外部容器
        postgresql['enable'] = false
        redis['enable'] = false

        # 外部 PostgreSQL 连接
        gitlab_rails['db_adapter'] = 'postgresql'
        gitlab_rails['db_host'] = 'postgresql'
        gitlab_rails['db_port'] = 5432
        gitlab_rails['db_database'] = 'gitlabhq_production'
        gitlab_rails['db_username'] = 'gitlab'
        gitlab_rails['db_password'] = 'gitlab_password'

        # 外部 Redis 连接
        gitlab_rails['redis_host'] = 'redis'
        gitlab_rails['redis_port'] = 6379

        gitlab_rails['gitlab_shell_ssh_port'] = 22

        # Nginx 反向代理配置（SSL 由外部处理）
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        nginx['proxy_set_headers'] = {
          "Host" => "$$http_host",
          "X-Real-IP" => "$$remote_addr",
          "X-Forwarded-For" => "$$proxy_add_x_forwarded_for",
          "X-Forwarded-Port" => "443",
          "X-Forwarded-Proto" => "https",
          "X-Forwarded-Ssl" => "on"
        }

        # Puma 配置（替代已废弃的 Unicorn）
        puma['worker_processes'] = 4
        puma['min_threads'] = 4
        puma['max_threads'] = 4
        puma['worker_timeout'] = 120
        puma['per_worker_max_memory_mb'] = 1024

        # Sidekiq 配置
        sidekiq['max_concurrency'] = 20

        # 禁用不需要的内置监控组件（减少资源占用）
        prometheus_monitoring['enable'] = false
    shm_size: '256m'
    ports:
      - "80:80"
      - "443:443"
      - "22:22"
    volumes:
      - ./gitlab/config:/etc/gitlab
      - ./gitlab/logs:/var/log/gitlab
      - ./gitlab/data:/var/opt/gitlab
    depends_on:
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - gitlab_network

  postgresql:
    image: postgres:16
    container_name: gitlab_postgresql
    restart: unless-stopped
    shm_size: '8g'
    environment:
      POSTGRES_DB: gitlabhq_production
      POSTGRES_USER: gitlab
      POSTGRES_PASSWORD: gitlab_password
      # 强一致性配置
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: >
      postgres
      -c synchronous_commit=on
      -c fsync=on
      -c full_page_writes=on
      -c wal_log_hints=on
      -c wal_keep_size=4GB
      -c max_wal_size=4GB
      -c min_wal_size=1GB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=64MB
      -c shared_buffers=8GB
      -c effective_cache_size=24GB
      -c work_mem=32MB
      -c maintenance_work_mem=1GB
      -c default_statistics_target=500
      -c random_page_cost=1.1
      -c effective_io_concurrency=400
      -c log_destination=stderr
      -c logging_collector=on
      -c log_directory=log
      -c log_filename=postgresql-%Y-%m-%d_%H%M%S.log
      -c log_rotation_age=1d
      -c log_rotation_size=100MB
      -c log_min_duration_statement=1000
      -c log_checkpoints=on
      -c log_connections=on
      -c log_disconnections=on
      -c log_lock_waits=on
      -c log_temp_files=0
      -c log_autovacuum_min_duration=0
      -c log_line_prefix='%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
    volumes:
      - ./postgresql/data:/var/lib/postgresql/data
      - ./postgresql/init:/docker-entrypoint-initdb.d
      - ./postgresql/logs:/var/lib/postgresql/data/log
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitlab -d gitlabhq_production"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gitlab_network

  redis:
    image: redis:6-alpine
    container_name: gitlab_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 4gb --maxmemory-policy allkeys-lru --tcp-keepalive 300
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - gitlab_network

  gitlab-runner-02:
    image: gitlab/gitlab-runner:latest
    container_name: gitlab_runner_02
    restart: unless-stopped
    volumes:
      - ./gitlab-runner-02/config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - gitlab_network

  frpc:
    image: snowdreamtech/frpc:latest
    container_name: frpc
    restart: unless-stopped
    volumes:
      - ./frpc/frpc.ini:/etc/frp/frpc.ini:ro
    command: ["frpc", "-c", "/etc/frp/frpc.ini"]
    networks:
      - gitlab_network

networks:
  gitlab_network:
    driver: bridge

